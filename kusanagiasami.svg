<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name-text {
      font-family: 'Georgia', serif;
      font-size: 45px;
      font-weight: bold;
      letter-spacing: 6px;
      fill: none;
      stroke: white;
      stroke-width: 1.5;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: draw 3s ease-in-out forwards, fillIn 1.5s ease-in forwards 2.5s;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes fillIn {
      to {
        fill: white;
      }
    }
  </style>

  <rect width="100%" height="100%" fill="black"/>
  
  <text x="50%" y="55%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        class="name-text">
    KUSANAGI ASAMI
  </text>
</svg>
